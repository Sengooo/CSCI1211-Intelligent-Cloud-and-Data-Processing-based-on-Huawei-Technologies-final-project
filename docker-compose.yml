version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount the application code to allow hot-reloading
      - ./booking_clone:/app
    environment:
      - BOOKING_CLONE_ENV_ID=local
      - BLOG_REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data



volumes:
  redis_data:
